name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  gateway:
    name: Gateway / Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: gateway

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install declared minimum Rust toolchain
        run: |
          rustup toolchain install 1.94.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.94.0

      - name: Cache Cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-1.94.0-${{ hashFiles('gateway/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-1.94.0-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked

  migrations:
    name: Database / Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Prepare CI environment
        run: cp .env.example .env

      - name: Validate shell scripts
        run: bash -n infra/postgres/init/01-roles.sh infra/minio/bootstrap.sh

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Start Postgres
        run: docker compose up -d --wait postgres

      - name: Apply all migrations
        run: docker compose run --rm migrator

      - name: Roll back all migrations
        run: >-
          docker compose run --rm migrator
          -path=/migrations
          -database="postgres://buildlens:buildlens_dev_password@postgres:5432/buildlens?sslmode=disable"
          down -all

      - name: Reapply all migrations
        run: docker compose run --rm migrator

      - name: Verify schema version
        run: |
          version="$(docker compose exec -T postgres psql -U buildlens -d buildlens -Atc 'SELECT version FROM schema_migrations')"
          test "$version" = "11"

      - name: Stop migration services
        if: always()
        run: docker compose down -v

  stack:
    name: Stack / Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Prepare CI environment
        run: cp .env.example .env

      - name: Start gateway dependencies
        run: docker compose up -d --wait postgres redis

      - name: Apply migrations
        run: docker compose run --rm migrator

      - name: Build and start gateway image
        run: docker compose --profile app up -d --build --wait --no-deps gateway

      - name: Check liveness and readiness
        run: |
          curl --fail --silent --show-error http://localhost:8080/health
          curl --fail --silent --show-error http://localhost:8080/health/ready

      - name: Show gateway logs after failure
        if: failure()
        run: docker compose --profile app logs gateway

      - name: Stop application services
        if: always()
        run: docker compose --profile app down -v
